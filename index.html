<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Master Editor | Dark Pro</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cropper.js for professional cropping functionality -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #020617; /* Deepest blue-black */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cropper-container {
            max-height: 500px;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #0f172a;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        /* Cropper customization for dark mode */
        .cropper-view-box, .cropper-face { border-radius: 4px; }
        .cropper-line, .cropper-point { background-color: #3b82f6; }
        .cropper-bg { background-image: none !important; background-color: #0f172a !important; }

        .btn-action {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:hover {
            transform: translateY(-1px);
        }
        .btn-action:active {
            transform: translateY(0);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="file"]::-webkit-file-upload-button { display: none; }

        .stat-badge {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 2px 8px;
            border-radius: 6px;
            color: #60a5fa;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex flex-col items-center">
    <div class="max-w-5xl w-full">
        <!-- Header -->
        <header class="mb-12 text-center fade-in" style="animation-delay: 0.1s;">
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">Image Master <span class="text-blue-500">Editor</span></h1>
            <p class="text-slate-400 font-medium">Professional grade conversion, scaling, and cropping</p>
        </header>

        <!-- Main Content -->
        <main class="glass-panel rounded-3xl p-6 md:p-8 shadow-2xl fade-in" style="animation-delay: 0.2s;">
            
            <!-- Upload Section -->
            <div id="upload-zone" class="border-2 border-dashed border-slate-700 rounded-2xl p-16 text-center cursor-pointer hover:border-blue-500 hover:bg-slate-800/50 transition-all group">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <div id="upload-prompt" class="space-y-4">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto group-hover:bg-blue-600/20 group-hover:scale-110 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400 group-hover:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xl font-semibold text-slate-200">Drop your image here</p>
                        <p class="text-slate-500 mt-1">or click to browse your files</p>
                    </div>
                </div>
            </div>

            <!-- Editor Interface (Hidden until upload) -->
            <div id="editor-ui" class="hidden space-y-10 animate-in">
                
                <!-- Canvas Area -->
                <div class="relative">
                    <div class="cropper-container shadow-inner">
                        <img id="image-to-edit" src="" alt="To Edit">
                    </div>
                    <!-- Live Dimension Overlay -->
                    <div class="absolute bottom-4 right-4 bg-slate-900/80 backdrop-blur-md px-3 py-1.5 rounded-lg border border-slate-700 text-xs font-mono text-slate-300 pointer-events-none flex items-center gap-2">
                        <span class="text-slate-500">Export Size:</span>
                        <span id="live-dimensions" class="text-blue-400 font-bold">0 × 0</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    
                    <!-- Formats -->
                    <div class="space-y-4">
                        <label class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-widest">
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span> 1. Format
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="setFormat('image/webp')" class="format-btn btn-action p-3 border border-slate-700 rounded-xl bg-blue-600 border-blue-400 text-white font-semibold" data-format="image/webp">WebP</button>
                            <button onclick="setFormat('image/jpeg')" class="format-btn btn-action p-3 border border-slate-700 rounded-xl hover:bg-slate-700/50 text-slate-300" data-format="image/jpeg">JPEG</button>
                            <button onclick="setFormat('image/png')" class="format-btn btn-action p-3 border border-slate-700 rounded-xl hover:bg-slate-700/50 text-slate-300" data-format="image/png">PNG</button>
                            <button onclick="setFormat('image/gif')" class="format-btn btn-action p-3 border border-slate-700 rounded-xl hover:bg-slate-700/50 text-slate-300" data-format="image/gif">GIF</button>
                        </div>
                    </div>

                    <!-- Scaling -->
                    <div class="space-y-4">
                        <label class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-widest">
                            <span class="w-2 h-2 bg-purple-500 rounded-full"></span> 2. Scale
                        </label>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="setScale(0.25)" class="scale-btn btn-action flex-1 py-2 border border-slate-700 rounded-xl text-slate-300 hover:bg-slate-700/50" data-scale="0.25">1/4x</button>
                            <button onclick="setScale(0.5)" class="scale-btn btn-action flex-1 py-2 border border-slate-700 rounded-xl text-slate-300 hover:bg-slate-700/50" data-scale="0.5">1/2x</button>
                            <button onclick="setScale(1)" class="scale-btn btn-action flex-1 py-2 border border-blue-500/50 bg-blue-500/10 rounded-xl text-blue-400 font-bold" data-scale="1">1x</button>
                            <button onclick="setScale(2)" class="scale-btn btn-action flex-1 py-2 border border-slate-700 rounded-xl text-slate-300 hover:bg-slate-700/50" data-scale="2">2x</button>
                            <button onclick="setScale(4)" class="scale-btn btn-action flex-1 py-2 border border-slate-700 rounded-xl text-slate-300 hover:bg-slate-700/50" data-scale="4">4x</button>
                        </div>
                    </div>

                    <!-- Aspect & Action -->
                    <div class="space-y-4">
                        <label class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-widest">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> 3. Crop & Save
                        </label>
                        <div class="flex gap-2 mb-4">
                            <button onclick="cropper.setAspectRatio(NaN)" class="flex-1 py-2 bg-slate-800 rounded-xl text-xs hover:bg-slate-700 transition">Free</button>
                            <button onclick="cropper.setAspectRatio(1)" class="flex-1 py-2 bg-slate-800 rounded-xl text-xs hover:bg-slate-700 transition">1:1</button>
                            <button onclick="cropper.setAspectRatio(16/9)" class="flex-1 py-2 bg-slate-800 rounded-xl text-xs hover:bg-slate-700 transition">16:9</button>
                        </div>
                        
                        <button id="download-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-900/40 transition-all flex items-center justify-center gap-2 group">
                            <span>Process & Download</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:translate-y-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Footer Summary Stats -->
                <div class="pt-6 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-xs">
                    <button onclick="resetEditor()" class="hover:text-red-400 transition-colors flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        Discard and restart
                    </button>
                    <div class="flex items-center gap-6">
                        <div class="flex items-center gap-2">
                            <span>Target Format:</span>
                            <span id="summary-format" class="stat-badge">WEBP</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span>Applied Scale:</span>
                            <span id="summary-scale" class="stat-badge">100%</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadZone = document.getElementById('upload-zone');
        const editorUi = document.getElementById('editor-ui');
        const imageToEdit = document.getElementById('image-to-edit');
        const downloadBtn = document.getElementById('download-btn');
        const liveDimensions = document.getElementById('live-dimensions');
        
        const summaryFormat = document.getElementById('summary-format');
        const summaryScale = document.getElementById('summary-scale');

        let cropper;
        let selectedFormat = 'image/webp';
        let selectedScale = 1;

        // --- Upload Handling ---

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('border-blue-500', 'bg-slate-800/50');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('border-blue-500', 'bg-slate-800/50');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('border-blue-500', 'bg-slate-800/50');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                imageToEdit.src = e.target.result;
                uploadZone.classList.add('hidden');
                editorUi.classList.remove('hidden');
                
                if (cropper) cropper.destroy();
                cropper = new Cropper(imageToEdit, {
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.8,
                    guides: true,
                    center: true,
                    highlight: false,
                    responsive: true,
                    crop(event) {
                        updateLiveDimensions(event.detail.width, event.detail.height);
                    }
                });
            };
            reader.readAsDataURL(file);
        }

        function updateLiveDimensions(w, h) {
            const finalW = Math.round(w * selectedScale);
            const finalH = Math.round(h * selectedScale);
            liveDimensions.textContent = `${finalW} × ${finalH}`;
        }

        // --- Controls ---

        function setFormat(mime) {
            selectedFormat = mime;
            summaryFormat.textContent = mime.split('/')[1].toUpperCase();
            
            document.querySelectorAll('.format-btn').forEach(btn => {
                const isActive = btn.dataset.format === mime;
                btn.classList.toggle('bg-blue-600', isActive);
                btn.classList.toggle('border-blue-400', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('font-semibold', isActive);
                if(!isActive) {
                    btn.classList.add('hover:bg-slate-700/50', 'text-slate-300');
                    btn.classList.remove('bg-blue-600', 'border-blue-400', 'text-white', 'font-semibold');
                }
            });
        }

        function setScale(val) {
            selectedScale = val;
            summaryScale.textContent = (val * 100) + '%';
            
            // Force dimension update if cropper exists
            if (cropper) {
                const data = cropper.getData();
                updateLiveDimensions(data.width, data.height);
            }

            document.querySelectorAll('.scale-btn').forEach(btn => {
                const isActive = parseFloat(btn.dataset.scale) === val;
                btn.classList.toggle('border-blue-500/50', isActive);
                btn.classList.toggle('bg-blue-500/10', isActive);
                btn.classList.toggle('text-blue-400', isActive);
                btn.classList.toggle('font-bold', isActive);
                if(!isActive) {
                    btn.classList.add('text-slate-300', 'hover:bg-slate-700/50');
                }
            });
        }

        // --- Final Processing ---

        downloadBtn.addEventListener('click', () => {
            if (!cropper) return;

            const cropData = cropper.getData();
            const targetWidth = cropData.width * selectedScale;
            const targetHeight = cropData.height * selectedScale;

            const canvas = cropper.getCroppedCanvas({
                width: targetWidth,
                height: targetHeight,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            const extMap = { 'image/webp': 'webp', 'image/jpeg': 'jpg', 'image/png': 'png', 'image/gif': 'gif' };
            const dataUrl = canvas.toDataURL(selectedFormat, 0.9);
            const link = document.createElement('a');
            link.download = `pro-edit-${Date.now()}.${extMap[selectedFormat]}`;
            link.href = dataUrl;
            link.click();
        });

        function resetEditor() {
            if (cropper) cropper.destroy();
            uploadZone.classList.remove('hidden');
            editorUi.classList.add('hidden');
            fileInput.value = '';
        }
    </script>
</body>
</html>

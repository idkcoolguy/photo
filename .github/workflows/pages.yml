name: Deploy GitHub Pages

# Automatically deploys the root of the repository to GitHub Pages
# This workflow is optional; Pages will serve `index.html` from the main branch
# even without it, but the action can help if you later build assets.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
